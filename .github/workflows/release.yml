name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DIST_DIR="dist"
          LDFLAGS="-s -w -X github.com/benjaminschreck/go-stencil/internal/version.Version=${VERSION} -X github.com/benjaminschreck/go-stencil/internal/version.Commit=${COMMIT} -X github.com/benjaminschreck/go-stencil/internal/version.Date=${BUILD_DATE}"

          rm -rf "${DIST_DIR}"
          mkdir -p "${DIST_DIR}"

          build_target() {
            local goos="$1"
            local goarch="$2"
            local ext="$3"
            local archive_format="$4"
            local binary_name="stencil${ext}"
            local base_name="go-stencil_${VERSION}_${goos}_${goarch}"
            local target_dir="${DIST_DIR}/${base_name}"

            mkdir -p "${target_dir}"

            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "${LDFLAGS}" -o "${target_dir}/${binary_name}" ./cmd/stencil

            case "${archive_format}" in
              tar.gz)
                tar -C "${DIST_DIR}" -czf "${DIST_DIR}/${base_name}.tar.gz" "${base_name}"
                ;;
              zip)
                (
                  cd "${DIST_DIR}"
                  zip -rq "${base_name}.zip" "${base_name}"
                )
                ;;
              *)
                echo "unsupported archive format: ${archive_format}" >&2
                exit 1
                ;;
            esac
          }

          build_target linux amd64 "" tar.gz
          build_target linux arm64 "" tar.gz
          build_target darwin amd64 "" tar.gz
          build_target darwin arm64 "" tar.gz
          build_target windows amd64 ".exe" zip

          (
            cd "${DIST_DIR}"
            sha256sum ./*.tar.gz ./*.zip > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
